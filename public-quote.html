    <style>
        :root {
            --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-gray-50: #f9fafb;
            --color-gray-100: #f3f4f6;
            --color-gray-200: #e5e7eb;
            --color-gray-300: #d1d5db;
            --color-gray-400: #9ca3af;
            --color-gray-500: #6b7280;
            --color-gray-600: #4b5563;
            --color-gray-700: #374151;
            --color-gray-800: #1f2937;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 0.375rem;
            --radius-lg: 0.75rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.5;
            font-size: 14px;
            padding: 1rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-box {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }
        .error-box h2 {
            color: var(--color-danger);
            margin-bottom: 1rem;
        }
        .quote-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .quote-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, #1d4ed8 100%);
            color: white;
            padding: 1.5rem;
        }
        .quote-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .quote-header .company-name {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .quote-header .quote-meta {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.85;
        }
        .quote-body {
            padding: 1.5rem;
        }
        .client-info {
            background: var(--color-gray-50);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .client-info h3 {
            font-size: 0.85rem;
            color: var(--color-gray-500);
            margin-bottom: 0.5rem;
        }
        .client-info .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        .client-info .info-item {
            font-size: 0.9rem;
        }
        .client-info .info-label {
            color: var(--color-gray-500);
            font-size: 0.8rem;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        .items-table th {
            background: var(--color-gray-100);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-gray-600);
            border-bottom: 2px solid var(--color-gray-200);
        }
        .items-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--color-gray-100);
            font-size: 0.9rem;
        }
        .items-table .text-right {
            text-align: right;
        }
        .items-table .text-center {
            text-align: center;
        }
        .quote-summary {
            background: var(--color-gray-50);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            font-size: 0.9rem;
        }
        .summary-row.total {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
            border-top: 2px solid var(--color-gray-200);
            margin-top: 0.5rem;
            padding-top: 0.75rem;
        }
        .quote-notes {
            font-size: 0.85rem;
            color: var(--color-gray-600);
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            border-radius: 0 var(--radius) var(--radius) 0;
        }
        .quote-validity {
            font-size: 0.85rem;
            color: var(--color-gray-500);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        /* 签名区域 */
        .signature-section {
            background: var(--color-gray-50);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .signature-section h3 {
            font-size: 1rem;
            color: var(--color-gray-700);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .signature-status {
            padding: 1rem;
            background: white;
            border-radius: var(--radius);
            text-align: center;
        }
        .signature-status.signed {
            border: 2px solid var(--color-success);
        }
        .signature-status.not-signed {
            border: 2px dashed var(--color-gray-300);
        }
        .signature-display {
            margin-top: 1rem;
        }
        .signature-display img {
            max-width: 200px;
            height: auto;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius);
        }
        .signature-info {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--color-gray-500);
        }
        .signature-pad-container {
            background: white;
            border-radius: var(--radius);
            padding: 1rem;
        }
        .signature-canvas {
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius);
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            height: 150px;
            background: white;
            display: block;
        }
        .signature-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: flex-end;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--color-primary-hover);
        }
        .btn-outline {
            background: white;
            color: var(--color-gray-600);
            border: 1px solid var(--color-gray-300);
        }
        .btn-outline:hover {
            background: var(--color-gray-50);
        }
        .btn-success {
            background: var(--color-success);
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .confirmed-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--color-success);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 600;
        }
        .pending-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--color-gray-200);
            color: var(--color-gray-600);
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 500;
        }
        .action-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        /* 打印样式 */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .quote-card {
                box-shadow: none;
            }
            .signature-section {
                page-break-inside: avoid;
            }
        }
        /* 响应式 */
        @media (max-width: 640px) {
            body { font-size: 12px; padding: 0.5rem; }
            .container { padding: 0; }
            .quote-header { padding: 1rem; }
            .quote-header h1 { font-size: 1.25rem; }
            .quote-header .quote-meta { flex-direction: column; gap: 0.5rem; }
            .quote-body { padding: 1rem; }
            .client-info .info-grid { grid-template-columns: 1fr; }
            .items-table { font-size: 0.85rem; }
            .items-table th, .items-table td { padding: 0.5rem; }
            .action-buttons { flex-direction: column; }
            .action-buttons .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在加载报价单...</p>
        </div>
    </div>

    <script>
        // 全局变量
        let quoteData = null;
        let configData = null;
        let settingsData = null;
        let customerSignature = null;
        let isSigned = false;
        let signatureTime = null;
        let shareUniqueId = null; // 分享数据的唯一标识，用于签名key

        // 解析URL参数
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 解压缩数据（支持多种格式）
        function decompressData(compressed) {
            console.log('开始解码数据，长度:', compressed.length);
            
            try {
                // 方法1：尝试 LZString 解压缩
                if (typeof LZString !== 'undefined') {
                    console.log('LZString 已加载，尝试解压缩...');
                    try {
                        const decompressed = LZString.decompressFromEncodedURIComponent(compressed);
                        if (decompressed) {
                            console.log('LZString 解压缩成功，长度:', decompressed.length);
                            return JSON.parse(decompressed);
                        } else {
                            console.log('LZString 返回空，尝试其他方法');
                        }
                    } catch (e1) {
                        console.log('LZString 解压缩失败:', e1.message);
                    }
                } else {
                    console.log('LZString 未加载');
                }
                
                // 方法2：纯 URI 编码（encodeURIComponent）
                try {
                    console.log('尝试 decodeURIComponent...');
                    const decoded = decodeURIComponent(compressed);
                    const result = JSON.parse(decoded);
                    console.log('decodeURIComponent 解码成功');
                    return result;
                } catch (e2) {
                    console.log('decodeURIComponent 失败:', e2.message);
                }
                
                // 方法3：双重 URI 编码（某些情况）
                try {
                    console.log('尝试双重 decodeURIComponent...');
                    const decoded1 = decodeURIComponent(compressed);
                    const decoded2 = decodeURIComponent(decoded1);
                    const result = JSON.parse(decoded2);
                    console.log('双重 decodeURIComponent 解码成功');
                    return result;
                } catch (e3) {
                    console.log('双重 decodeURIComponent 失败:', e3.message);
                }
                
                // 方法4：Base64 + URI 编码
                try {
                    console.log('尝试 Base64 + decodeURIComponent...');
                    const decoded = decodeURIComponent(atob(compressed));
                    const result = JSON.parse(decoded);
                    console.log('Base64 解码成功');
                    return result;
                } catch (e4) {
                    console.log('Base64 解码失败:', e4.message);
                }
                
                console.error('所有解码方法都失败了');
                return null;
            } catch (e) {
                console.error('解压缩失败:', e);
                return null;
            }
        }

        // 加载报价数据（确保 LZString 先加载）
        function loadQuote() {
            const compressed = getQueryParam('data');
            const signedData = getQueryParam('signed');
            
            if (signedData) {
                // 已签署链接，优先解析
                processSignedData(signedData);
                return;
            }
            
            if (!compressed) {
                showError('无效的链接', '缺少报价数据，请检查链接是否正确。');
                return;
            }

            // 确保 LZString 已加载，最多等待5秒
            if (typeof LZString === 'undefined') {
                console.log('等待 LZString 加载...');
                let waitCount = 0;
                const checkInterval = setInterval(function() {
                    waitCount++;
                    if (typeof LZString !== 'undefined') {
                        clearInterval(checkInterval);
                        console.log('LZString 加载完成');
                        processData(compressed);
                    } else if (waitCount > 50) { // 5秒超时
                        clearInterval(checkInterval);
                        console.log('LZString 加载超时，使用备选方法');
                        processData(compressed);
                    }
                }, 100);
            } else {
                processData(compressed);
            }
        }

        // 处理数据
        function processData(compressed) {
            const data = decompressData(compressed);
            if (!data) {
                showError('数据解析失败', '无法解析报价数据，请确认链接完整性。\n\n提示：如果链接很长，可能数据太大无法传输。');
                return;
            }

            quoteData = data.q || {};
            configData = data.c || {};
            settingsData = data.s || {};
            shareUniqueId = data.t || ('sig_' + Date.now()); // 使用分享数据中的唯一时间戳

            renderQuote();
        }

        // 处理已签署数据
        function processSignedData(compressed) {
            const data = decompressData(compressed);
            if (!data) {
                showError('数据解析失败', '无法解析已签署数据，请确认链接完整性。');
                return;
            }

            quoteData = data.q || {};
            configData = data.c || {};
            settingsData = data.s || {};
            shareUniqueId = data.t || ('sig_' + Date.now());
            
            // 设置签名数据
            if (data.sig) {
                customerSignature = data.sig.image;
                signatureTime = data.sig.time;
                isSigned = true;
            }

            renderQuote();
        }

        // 显示错误（带调试信息）
        function showError(title, message) {
            const compressed = getQueryParam('data');
            const debugInfo = compressed ? `
                <details style="margin-top:1rem;background:var(--color-gray-100);padding:1rem;border-radius:var(--radius);">
                    <summary style="cursor:pointer;font-weight:600;">🔍 调试信息（点击展开）</summary>
                    <div style="margin-top:0.5rem;font-size:0.8rem;color:var(--color-gray-600);">
                        <p>数据长度: ${compressed.length} 字符</p>
                        <p>数据前50字符: ${escapeHtml(compressed.substring(0, 50))}...</p>
                        <p>LZString状态: ${typeof LZString !== 'undefined' ? '已加载 ✓' : '未加载 ✗'}</p>
                        <p style="margin-top:0.5rem;">请将以上信息截图发送给技术支持。</p>
                    </div>
                </details>
            ` : '';
            
            document.getElementById('app').innerHTML = `
                <div class="error-box">
                    <h2>⚠️ ${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                    ${debugInfo}
                    <p style="margin-top:1rem;color:var(--color-gray-500);font-size:0.85rem;">
                        如果问题持续存在，请联系报价发送方确认链接。
                    </p>
                </div>
            `;
        }

        // HTML转义
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 格式化金额
        function formatCurrency(amount) {
            return '¥' + parseFloat(amount || 0).toFixed(2);
        }

        // 计算报价
        function calculateQuote() {
            if (!quoteData || !quoteData.items) return { subtotal: 0, discount: 0, tax: 0, total: 0 };

            const dr = configData.discountRate || 100;
            const tr = configData.taxRate || 0;
            const pm = configData.priceMode || 'in';

            const subtotal = quoteData.items.reduce((sum, item) => {
                return sum + (item.qty || 1) * (item.price || 0);
            }, 0);

            const discount = subtotal * (1 - dr / 100);
            const afterDiscount = subtotal * (dr / 100);

            let tax = 0;
            let total = afterDiscount;

            if (tr > 0) {
                if (pm === 'ex') {
                    tax = afterDiscount * (tr / 100);
                    total = afterDiscount + tax;
                } else {
                    tax = afterDiscount - (afterDiscount / (1 + tr / 100));
                    total = afterDiscount;
                }
            }

            return { subtotal, discount, tax, total };
        }

        // 数字转中文大写金额（支持小数角分）
        function numberToChinese(num) {
            if (isNaN(num) || num === 0) return '零元整';
            
            const negative = num < 0;
            num = Math.abs(num);
            
            const digits = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
            const intUnits = ['', '拾', '佰', '仟'];
            const bigUnits = ['', '万', '亿', '万亿'];
            const decUnits = ['角', '分'];
            
            const intPart = Math.floor(num);
            const decPart = Math.round((num - intPart) * 100);
            
            let result = '';
            
            if (intPart > 0) {
                const intStr = String(intPart);
                const len = intStr.length;
                let zeroFlag = false;
                
                for (let i = 0; i < len; i++) {
                    const d = parseInt(intStr[i]);
                    const pos = len - i - 1;
                    const bigPos = Math.floor(pos / 4);
                    const unitPos = pos % 4;
                    
                    if (d === 0) {
                        zeroFlag = true;
                        if (unitPos === 0 && bigPos > 0) {
                            result += bigUnits[bigPos];
                            zeroFlag = false;
                        }
                    } else {
                        if (zeroFlag) {
                            result += '零';
                            zeroFlag = false;
                        }
                        result += digits[d] + intUnits[unitPos];
                        if (unitPos === 0 && bigPos > 0) {
                            result += bigUnits[bigPos];
                        }
                    }
                }
                result += '元';
            }
            
            if (decPart === 0) {
                result += '整';
            } else {
                const jiao = Math.floor(decPart / 10);
                const fen = decPart % 10;
                
                if (jiao > 0) {
                    result += digits[jiao] + decUnits[0];
                } else if (intPart > 0) {
                    result += '零';
                }
                
                if (fen > 0) {
                    result += digits[fen] + decUnits[1];
                }
            }
            
            return (negative ? '负' : '') + result;
        }

        // 渲染报价单
        function renderQuote() {
            const { subtotal, discount, tax, total } = calculateQuote();
            const vd = settingsData.quoteValidDays || 7;
            const today = new Date();
            const validDate = new Date(today.getTime() + vd * 24 * 60 * 60 * 1000);

            // 检查本地存储的签名状态（使用唯一分享ID）
            const savedSignature = localStorage.getItem('customerSignature_' + shareUniqueId);
            if (savedSignature) {
                try {
                    const sigData = JSON.parse(savedSignature);
                    customerSignature = sigData.image;
                    signatureTime = sigData.time;
                    isSigned = true;
                } catch (e) {}
            }

            const itemsHtml = (quoteData.items || []).map((item, idx) => {
                const qty = item.qty || 1;
                const price = item.price || 0;
                const itemTotal = qty * price * (configData.discountRate || 100) / 100;
                return `
                    <tr>
                        <td class="text-center">${idx + 1}</td>
                        <td>${escapeHtml(item.name)}</td>
                        <td>${escapeHtml(item.spec || '-')}</td>
                        <td class="text-center">${item.unit || '项'}</td>
                        <td class="text-center">${qty}</td>
                        <td class="text-right">${formatCurrency(price)}</td>
                        <td class="text-right">${formatCurrency(itemTotal)}</td>
                    </tr>
                `;
            }).join('');

            const taxLabel = configData.taxRate > 0
                ? (configData.priceMode === 'in' ? '（含税）' : '（另加税）')
                : '';

            document.getElementById('app').innerHTML = `
                <div class="quote-card">
                    <div class="quote-header">
                        <h1>${escapeHtml(quoteData.title || '产品报价单')}</h1>
                        ${settingsData.companyName ? `<div class="company-name">${escapeHtml(settingsData.companyName)}</div>` : ''}
                        <div class="quote-meta">
                            ${quoteData.quoteNumber ? `<span>编号：${escapeHtml(quoteData.quoteNumber)}</span>` : ''}
                            <span>日期：${today.toLocaleDateString('zh-CN')}</span>
                        </div>
                    </div>

                    <div class="quote-body">
                        <div class="client-info">
                            <h3>客户信息</h3>
                            <div class="info-grid">
                                ${quoteData.clientName ? `<div class="info-item"><span class="info-label">公司名称：</span>${escapeHtml(quoteData.clientName)}</div>` : ''}
                                ${quoteData.clientContactPerson ? `<div class="info-item"><span class="info-label">联系人：</span>${escapeHtml(quoteData.clientContactPerson)}</div>` : ''}
                                ${quoteData.clientPhone ? `<div class="info-item"><span class="info-label">联系电话：</span>${escapeHtml(quoteData.clientPhone)}</div>` : ''}
                                ${quoteData.clientEmail ? `<div class="info-item"><span class="info-label">邮箱：</span>${escapeHtml(quoteData.clientEmail)}</div>` : ''}
                            </div>
                        </div>

                        <table class="items-table">
                            <thead>
                                <tr>
                                    <th style="width:50px;">序号</th>
                                    <th>产品名称</th>
                                    <th>规格</th>
                                    <th style="width:60px;">单位</th>
                                    <th style="width:60px;">数量</th>
                                    <th style="width:100px;">单价</th>
                                    <th style="width:100px;">小计</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${itemsHtml}
                            </tbody>
                        </table>

                        <div class="quote-summary">
                            <div class="summary-row">
                                <span>报价合计：</span>
                                <span>${formatCurrency(subtotal)}</span>
                            </div>
                            ${configData.discountRate && configData.discountRate < 100 ? `
                            <div class="summary-row">
                                <span>折扣 (${configData.discountRate}%)：</span>
                                <span>-${formatCurrency(discount)}</span>
                            </div>
                            ` : ''}
                            ${configData.taxRate > 0 ? `
                            <div class="summary-row">
                                <span>税额 (${configData.taxRate}%)：</span>
                                <span>${formatCurrency(tax)}</span>
                            </div>
                            ` : ''}
                            <div class="summary-row total">
                                <span>合计 ${taxLabel}：</span>
                                <span>${formatCurrency(total)}</span>
                            </div>
                            <div class="summary-row" style="font-size:0.85rem;color:var(--color-gray-500);border-top:1px solid var(--color-gray-200);padding-top:0.5rem;margin-top:0.5rem;">
                                <span>大写金额：</span>
                                <span>${numberToChinese(total)}</span>
                            </div>
                        </div>

                        ${settingsData.companyNotes ? `
                        <div class="quote-notes">
                            <strong>备注：</strong><br>
                            ${escapeHtml(settingsData.companyNotes).replace(/\n/g, '<br>')}
                        </div>
                        ` : ''}

                        <div class="quote-validity">
                            本报价单有效期至 ${validDate.toLocaleDateString('zh-CN')}（共 ${vd} 天）
                        </div>

                        <!-- 签名确认区域 -->
                        <div class="signature-section no-print">
                            <h3>✍️ 客户确认签署</h3>
                            <div id="signatureArea">
                                ${isSigned ? `
                                    <div class="signature-status signed">
                                        <span class="confirmed-badge">✓ 已确认签署</span>
                                        <div class="signature-display">
                                            <img src="${customerSignature}" alt="客户签名">
                                        </div>
                                        <div class="signature-info">
                                            签署时间：${new Date(signatureTime).toLocaleString('zh-CN')}
                                        </div>
                                    </div>
                                ` : `
                                    <div class="signature-status not-signed">
                                        <span class="pending-badge">⏳ 待确认签署</span>
                                        <div class="signature-pad-container" id="signaturePadContainer" style="display:none;">
                                            <canvas id="signatureCanvas" class="signature-canvas"></canvas>
                                            <div class="signature-buttons">
                                                <button class="btn btn-outline" onclick="clearSignature()">🗑️ 清除</button>
                                                <button class="btn btn-primary" onclick="saveSignature()">✅ 确认签署</button>
                                            </div>
                                        </div>
                                        <button class="btn btn-success" id="startSignBtn" onclick="startSignature()" style="margin-top:1rem;">
                                            开始签署
                                        </button>
                                    </div>
                                `}
                            </div>
                        </div>

                        <div class="action-buttons no-print">
                            <button class="btn btn-primary" onclick="window.print()">🖨️ 打印报价单</button>
                            <button class="btn btn-outline" onclick="downloadPDF()">📄 导出PDF</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 开始签名
        function startSignature() {
            document.getElementById('startSignBtn').style.display = 'none';
            document.getElementById('signaturePadContainer').style.display = 'block';
            initSignaturePad();
        }

        // 初始化签名板
        function initSignaturePad() {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let drawing = false;
            let lastX = 0, lastY = 0;

            // 设置画布尺寸
            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return {
                    x: (clientX - rect.left) * (canvas.width / rect.width),
                    y: (clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            canvas.addEventListener('mousedown', function(e) {
                drawing = true;
                const pos = getPos(e);
                lastX = pos.x;
                lastY = pos.y;
            });

            canvas.addEventListener('mousemove', function(e) {
                if (!drawing) return;
                e.preventDefault();
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                lastX = pos.x;
                lastY = pos.y;
            });

            canvas.addEventListener('mouseup', function() { drawing = false; });
            canvas.addEventListener('mouseleave', function() { drawing = false; });

            // 触摸支持
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                drawing = true;
                const pos = getPos(e);
                lastX = pos.x;
                lastY = pos.y;
            });

            canvas.addEventListener('touchmove', function(e) {
                if (!drawing) return;
                e.preventDefault();
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                lastX = pos.x;
                lastY = pos.y;
            });

            canvas.addEventListener('touchend', function() { drawing = false; });
        }

        // 清除签名
        function clearSignature() {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 生成确认码（基于签名数据生成6位哈希码）
        function generateConfirmCode(data) {
            const str = JSON.stringify(data) + new Date().getTime();
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            const code = Math.abs(hash).toString(36).toUpperCase().slice(-6);
            return code;
        }

        // 保存签名
        function saveSignature() {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;

            const dataUrl = canvas.toDataURL('image/png');
            const sigKey = 'customerSignature_' + shareUniqueId;
            const now = new Date().toISOString();
            
            const sigData = {
                image: dataUrl,
                time: now,
                quoteNumber: quoteData.quoteNumber || '',
                clientName: quoteData.clientName || '',
                shareId: shareUniqueId
            };

            const confirmCode = generateConfirmCode(sigData);
            sigData.confirmCode = confirmCode;

            localStorage.setItem(sigKey, JSON.stringify(sigData));

            // 生成已签署确认链接（包含签名数据）
            const signedShareData = {
                q: quoteData,
                c: configData,
                s: settingsData,
                t: shareUniqueId,
                sig: sigData // 包含签名图片的完整数据
            };
            
            let signedUrl = '';
            if (typeof LZString !== 'undefined') {
                const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(signedShareData));
                signedUrl = window.location.origin + window.location.pathname + '?signed=' + compressed;
            }

            document.getElementById('signatureArea').innerHTML = `
                <div class="signature-status signed">
                    <span class="confirmed-badge">✓ 已确认签署</span>
                    <div class="signature-display">
                        <img src="${dataUrl}" alt="客户签名">
                    </div>
                    <div class="signature-info">
                        签署时间：${new Date(now).toLocaleString('zh-CN')}
                    </div>
                    <div style="margin-top:1rem;padding:1rem;background:#ecfdf5;border-radius:var(--radius);border:2px solid var(--color-success);">
                        <div style="font-size:0.85rem;color:var(--color-gray-600);margin-bottom:0.5rem;">签署确认码（请回复给商家）</div>
                        <div style="font-size:1.8rem;font-weight:700;color:var(--color-success);letter-spacing:4px;">${confirmCode}</div>
                    </div>
                    <div style="margin-top:1rem;padding:1rem;background:#eff6ff;border-radius:var(--radius);border:2px solid var(--color-primary);">
                        <div style="font-size:0.85rem;color:var(--color-gray-600);margin-bottom:0.5rem;">📧 已签署确认链接</div>
                        <div style="font-size:0.85rem;color:var(--color-gray-500);margin-bottom:0.5rem;">将此链接发送给报价方，他们可以查看您的签名并导入到报价单中</div>
                        ${signedUrl ? `
                            <input type="text" value="${signedUrl}" id="signedUrlInput" readonly 
                                style="width:100%;padding:0.5rem;font-size:0.8rem;border:1px solid var(--color-gray-200);border-radius:4px;word-break:break-all;" />
                            <button onclick="copySignedUrl()" class="btn btn-primary" style="width:100%;margin-top:0.5rem;padding:0.5rem;font-size:0.9rem;">复制链接</button>
                        ` : `
                            <div style="color:var(--color-warning);font-size:0.9rem;">链接生成需要LZString支持</div>
                        `}
                    </div>
                </div>
            `;
        }

        function copySignedUrl() {
            const input = document.getElementById('signedUrlInput');
            if (input) {
                input.select();
                document.execCommand('copy');
                showToast('已复制已签署确认链接！', 'success');
            }
        }

        // 导出PDF（简单实现）
        function downloadPDF() {
            window.print();
        }

        // 页面加载完成后加载数据
        window.addEventListener('DOMContentLoaded', loadQuote);
    </script>
</body>
</html>
